<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yawhg-Style Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="start-cover-active">
    <div class="start-menu" id="startMenu">
      <canvas id="waveVisualizer" class="wave-visualizer" aria-hidden="true"></canvas>
      <div class="start-title" aria-hidden="true">cuboscillator</div>
      <div class="start-hint" aria-hidden="true">Hint: Cube the Circle, or Circle the Cube!</div>
      <div class="panel start-panel" id="modePanel">
        <div class="menu-actions">
          <button type="button" id="startOnePlayer">Play</button>
          <button type="button" id="escapeButton">Escape</button>
        </div>
      </div>

      <div class="cube-overlay hidden" id="cubeOverlay">
        <div class="cube-scene" aria-hidden="true">
          <div class="cube-rotator">
            <div class="cube" id="practiceCube">
              <div class="cube-face face-front"></div>
              <div class="cube-face face-back"></div>
              <div class="cube-face face-right"></div>
              <div class="cube-face face-left"></div>
              <div class="cube-face face-top"></div>
              <div class="cube-face face-bottom"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="cube-boundary" id="cubeBoundary" aria-hidden="true"></div>

      <div class="cube-hover-ring center-ring" id="cubeHoverRing" aria-hidden="true"></div>

      <div class="hud-panel hidden" id="hudPanel">
        <div class="hud-row">
          <label class="hud-toggle">
            <input type="checkbox" id="toggleWaveCoords" checked />
            <span>Show wave position</span>
          </label>
        </div>
        <div class="hud-row">
          <label class="hud-toggle">
            <input type="checkbox" id="toggleWaveHeader" checked />
            <span>Show waveform header</span>
          </label>
        </div>
        <div class="hud-row">
          <label class="hud-toggle">
            <input type="checkbox" id="toggleFloatStop" />
            <span>Stop floating</span>
          </label>
        </div>
      </div>

      <div class="waveform-header hidden" id="waveformHeader">Sine</div>

      <div class="panel start-panel hidden" id="controlPanel">
        <div class="status-row cube-coords-hud" id="cubeCoords">
          <div class="coord-line">
            <span>Cube dX:</span>
            <strong id="cubeCoordX">0</strong>
          </div>
          <div class="coord-line">
            <span>Cube dY:</span>
            <strong id="cubeCoordY">0</strong>
          </div>
          <div class="coord-line">
            <span>Dist:</span>
            <strong id="cubeCoordDist">0</strong>
          </div>
        </div>
        <div class="status-row wave-coords-hud hidden" id="waveCoords">
          <div class="coord-line">
            <span>Freq:</span>
            <strong id="waveCoordX">0.00</strong>
          </div>
          <div class="coord-line">
            <span>Amp:</span>
            <strong id="waveCoordY">0.00</strong>
          </div>
        </div>
        <div class="control-grid">
          <div class="wasd-grid character-grid" id="wasdGrid">
            <div class="wasd-card character-card" data-wasd-card data-key="W">
              <div class="selection-arrow" aria-hidden="true">W</div>
            </div>
            <div class="wasd-card character-card" data-wasd-card data-key="A">
              <div class="selection-arrow" aria-hidden="true">A</div>
            </div>
            <div class="wasd-card character-card" data-wasd-card data-key="S">
              <div class="selection-arrow" aria-hidden="true">S</div>
            </div>
            <div class="wasd-card character-card" data-wasd-card data-key="D">
              <div class="selection-arrow" aria-hidden="true">D</div>
            </div>
          </div>

          <div class="direction-grid character-grid" id="directionGrid">
            <div class="direction-card character-card" data-direction-card data-key="ArrowLeft">
              <div class="selection-arrow" aria-hidden="true">&larr;</div>
            </div>
            <div class="direction-card character-card" data-direction-card data-key="ArrowUp">
              <div class="selection-arrow" aria-hidden="true">&uarr;</div>
            </div>
            <div class="direction-card character-card" data-direction-card data-key="ArrowRight">
              <div class="selection-arrow" aria-hidden="true">&rarr;</div>
            </div>
            <div class="direction-card character-card" data-direction-card data-key="ArrowDown">
              <div class="selection-arrow" aria-hidden="true">&darr;</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
